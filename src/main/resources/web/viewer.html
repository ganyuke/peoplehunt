<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PeopleHunt AAR</title>
  <style>
__INLINE_CSS__
  </style>
</head>
<body>
<div class="page">
  <header class="header">
    <div>
      <h1>PeopleHunt After Action Report</h1>
      <div id="summary" class="summary"></div>
    </div>
  </header>

  <section class="panel controls">
    <div class="scrubber-row">
      <label for="scrubber">Time</label>
      <input id="scrubber" type="range" min="0" max="0" value="0" step="1000">
      <span id="timeLabel">0:00</span>
    </div>
    <div id="dimensionTabs" class="tabs"></div>
    <div id="playerList" class="players"></div>
  </section>

  <section class="layout">
    <div class="left-column">
      <div class="panel">
        <h2>Map</h2>
        <canvas id="mapCanvas" width="1200" height="620"></canvas>
      </div>
      <div class="panel">
        <h2>Health over time</h2>
        <canvas id="healthCanvas" width="1200" height="240"></canvas>
      </div>
    </div>
    <div class="right-column">
      <div class="panel">
        <h2>Timeline near current time</h2>
        <div id="timeline" class="scroll-box"></div>
      </div>
      <div class="panel">
        <h2>Chat log</h2>
        <div id="chatLog" class="scroll-box chat-log"></div>
      </div>
    </div>
  </section>
</div>
<script>
window.PEOPLEHUNT_REPORT_ID = "__REPORT_ID__";
</script>
<script>
__INLINE_JS__
</script>
</body>
</html>
