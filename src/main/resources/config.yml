match:
  elapsed-announcement-minutes: 30
  prime:
    keep-players-full: true
  player-path-sample-interval-ticks: 20
  auto-spectate-new-joins: true
compass:
  update-interval-ticks: 10
  dimension-mode: LAST_KNOWN
  item:
    name: '<light_purple>Hunter Compass'
    lore: []
kit:
  apply-on-start: true
end-portal-respawn:
  enabled: true
  overworld-radius: 64.0
reporting:
  storage-format: JSONL
  capture-advancements: true
  web:
    enabled: true
    port: 18765
deathstreaks:
  enabled: true
  tiers:
    - deaths: 3
      damage-to-reset: 6.0
      keep-inventory-mode: INHERIT
      saturation:
        food: 20
        saturation: 6.0
      potion-effects:
        - type: SPEED
          duration-seconds: 30
          amplifier: 0
      items:
        - material: IRON_HELMET
          amount: 1
        - material: IRON_CHESTPLATE
          amount: 1
        - material: IRON_LEGGINGS
          amount: 1
        - material: IRON_BOOTS
          amount: 1
    - deaths: 5
      damage-to-reset: 8.0
      keep-inventory-mode: ALL
      saturation:
        food: 20
        saturation: 8.0
      potion-effects:
        - type: SPEED
          duration-seconds: 45
          amplifier: 0
        - type: REGENERATION
          duration-seconds: 10
          amplifier: 0
      items:
        - material: IRON_HELMET
          amount: 1
        - material: IRON_CHESTPLATE
          amount: 1
        - material: IRON_LEGGINGS
          amount: 1
        - material: IRON_BOOTS
          amount: 1
        - material: SHIELD
          amount: 1
