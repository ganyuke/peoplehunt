match:
  player-path-sample-interval-ticks: 20
compass:
  update-interval-ticks: 10
  item:
    name: '<light_purple>Hunter Compass'
    lore: []
end-portal-respawn:
  enabled: true
  overworld-radius: 64.0
reporting:
  capture-advancements: true
  web:
    enabled: true
    # Bind address for the embedded report viewer. This is the local interface to listen on:
    # use 127.0.0.1 for local-only access, 0.0.0.0 for all interfaces, or a specific local IP.
    bind-address: 0.0.0.0
    port: 18765
  path-flush:
    # Path points are still recorded at full AAR fidelity; this only controls when buffered
    # points are flushed from memory into the staging report database during the match.
    max-buffered-points: 500
    max-buffered-seconds: 300
  mob-tracking:
    radius: 32.0
    stale-radius: 48.0
    stale-millis: 60000
attribution:
  lava:
    # Search window for attributing lava-like deaths (lava, fire, hot floor) back to placed lava.
    horizontal-radius: 4
    vertical-radius: 3
    window-millis: 30000
  explosion:
    # Search window for attributing explosion deaths back to recent explosive hazards.
    # Radius is configured in blocks; the hot path compares squared distances internally.
    radius: 8.0
    window-millis: 5000
rollback:
  memory-minutes: 5
  # Rollback snapshots are separate from AAR/report path samples.
  # Raising this reduces inventory-clone churn without changing report fidelity.
  sample-interval-ticks: 100
