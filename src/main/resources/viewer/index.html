<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manhunt Session Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <p class="eyebrow">Manhunt</p>
        <h1>Session Viewer</h1>
        <p class="subtle">Replay paths, deaths, and health samples from one exported session.</p>
      </div>

      <section class="card" id="sessionMeta"></section>

      <section class="card controls-card">
        <div class="field-row">
          <label for="worldSelect">World</label>
          <select id="worldSelect"></select>
        </div>
        <div class="field-row">
          <label for="timeSlider">Timeline</label>
          <div class="timeline-row">
            <button id="playButton" type="button">Play</button>
            <input id="timeSlider" type="range" min="0" max="1000" value="1000" step="1">
          </div>
          <p class="timeline-label" id="timeLabel"></p>
        </div>
      </section>

      <section class="card">
        <h2>Players</h2>
        <div id="playerLegend" class="legend"></div>
      </section>
    </aside>

    <main class="content">
      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Map</p>
            <h2>Tracker Replay</h2>
          </div>
          <p class="subtle" id="mapStats"></p>
        </div>
        <svg id="mapSvg" class="viz" viewBox="0 0 1000 620" role="img" aria-label="Player path map"></svg>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Graph</p>
            <h2>Player Health Over Time</h2>
          </div>
          <p class="subtle" id="healthStats"></p>
        </div>
        <svg id="healthSvg" class="viz health-viz" viewBox="0 0 1000 320" role="img" aria-label="Player health graph"></svg>
      </section>
    </main>
  </div>

  <script src="viewer-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
