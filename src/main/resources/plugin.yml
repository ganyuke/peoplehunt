name: PeopleHunt
version: ${version}
main: io.github.ganyuke.peoplehunt.PeopleHuntPlugin
description: Manhunt-style game administration for Paper.
author: ChatGPT 5.4 Pro
api-version: '1.21.11'
website: https://github.com/ganyuke/peoplehunt
commands:
  peoplehunt:
    aliases: [manhunt]
    description: Main PeopleHunt command.
    usage: /<command>
  compass:
    description: Get a manhunt compass.
    usage: /<command> [player]
    permission: peoplehunt.compass
  coordinate:
    description: Convert overworld and nether coordinates.
    usage: /<command> [overworld|nether] [x] [y] [z]
    permission: peoplehunt.coordinate
  wherewas:
    description: Remember and share private coordinates.
    usage: /<command> <this|remember|forget> ...
    permission: peoplehunt.wherewas
permissions:
  peoplehunt.admin:
    description: Allows administrative PeopleHunt commands.
    default: op
  peoplehunt.compass:
    description: Allows using /compass.
    default: true
  peoplehunt.coordinate:
    description: Allows using /coordinate.
    default: true
  peoplehunt.wherewas:
    description: Allows using /wherewas.
    default: true
